project_name: qwen2.5-3b-tool-calling


model:
  base_id: unsloth/Qwen2.5-3B-Instruct-bnb-4bit
  hf_id: Qwen/Qwen2.5-3B-Instruct
  max_seq_length: 2048          # 2048 is the safe T4 default; ~4096 possible w/ grad ckpt
  load_in_4bit: true            # QLoRA: 4-bit base weights
  dtype: null                   # null = auto (fp16 on T4)

lora:
  r: 16                         # rank
  alpha: 16                     # scaling (alpha == r is a robust default w/ Unsloth)
  dropout: 0.0                  # 0.0 is Unsloth-optimized (no perf penalty)
  bias: none
  use_gradient_checkpointing: unsloth   # "unsloth" = lowest VRAM long-context mode
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

data:
  dataset_id: Salesforce/xlam-function-calling-60k
  fallback_dataset_id: Post-training-Data-Flywheel/Salesforce-xlam-function-calling-60k

  split_seed: 42
  train_frac: 0.80
  val_frac: 0.10
  test_frac: 0.10
  max_samples: null

training:
  num_train_epochs: 1            # 1 epoch over all 48k examples is plenty
  per_device_train_batch_size: 8 # bigger batch uses the spare T4 VRAM -> fewer steps
  gradient_accumulation_steps: 4 # effective batch = 32  (~1500 steps for 48k)
  learning_rate: 2.0e-4
  lr_scheduler_type: cosine
  warmup_ratio: 0.03
  weight_decay: 0.01
  optim: adamw_8bit
  logging_steps: 20
  # In-training eval is the #1 time sink. Keep it rare + tiny; the real metrics
  # come from the full test set later. Set eval_strategy: "no" for max speed.
  eval_strategy: steps           # "steps" = cheap loss curve; "no" = fastest
  eval_steps: 500                # ~3 evals per run instead of ~30
  save_steps: 100                # save often so a crash loses <=100 steps
  save_total_limit: 2
  max_grad_norm: 1.0
  seed: 42
  packing: false

# Durable checkpoint backup. When push_to_hub is true, every saved checkpoint is
# pushed to your HF Hub repo, so progress survives even a full Kaggle wipe. On a
# fresh run, training resumes by pulling the latest checkpoint back down.
hub:
  push_to_hub: false             # set true to back up checkpoints to HF Hub
  repo_id: null                  # "username/qwen2.5-3b-tool-calling" (or env HF_HUB_REPO_ID)
  private: true

evaluation:
  num_test_samples: 500          # how many test-split rows to score (null = all)
  eval_during_training_samples: 300  # cap the in-training eval set (cheap loss curve)
  max_new_tokens: 512
  temperature: 0.0               # deterministic decoding for fair comparison
  batch_size: 8

gguf:
  llama_cpp_repo: https://github.com/ggml-org/llama.cpp
  quant_types:                   # produced for the quality-vs-size comparison
    - Q4_K_M
    - Q5_K_M
    - Q8_0
  use_imatrix: true              # importance matrix (helps <= Q4); skipped for Q8_0
  imatrix_samples: 200           # calibration rows drawn from the train split

paths:
  data_dir: data
  output_dir: outputs            # checkpoints + final adapter
  adapter_dir: outputs/adapter   # final LoRA adapter
  merged_dir: outputs/merged     # adapter merged into fp16 base (for GGUF)
  gguf_dir: outputs/gguf
  results_dir: results
  figures_dir: results/figures
  metrics_dir: results/metrics
